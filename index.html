<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Doral Gastos — Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',sans-serif;overflow:hidden;}
.stars{position:fixed;inset:0;z-index:0;}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle 3s infinite;}
@keyframes twinkle{0%,100%{opacity:.2;}50%{opacity:1;}}
.login-card{position:relative;z-index:1;background:rgba(20,10,40,0.97);border:1px solid rgba(180,100,255,0.3);border-radius:20px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 0 60px rgba(140,60,255,0.2);}
.brand{text-align:center;margin-bottom:32px;}
.brand h1{font-size:2.2rem;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#c084fc,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.brand p{color:#9ca3af;font-size:.85rem;margin-top:8px;}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#22c55e;margin-right:6px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4);}50%{box-shadow:0 0 0 6px rgba(34,197,94,0);}}
.form-group{margin-bottom:20px;}
label{display:block;color:#c4b5fd;font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(180,100,255,0.2);border-radius:10px;color:#f1f5f9;font-size:.95rem;outline:none;transition:all .2s;}
input:focus{border-color:#a855f7;box-shadow:0 0 0 3px rgba(168,85,247,.15);}
input::placeholder{color:#4b5563;}
.btn-login{width:100%;padding:15px;margin-top:8px;background:linear-gradient(135deg,#7c3aed,#a855f7);border:none;border-radius:10px;color:#fff;font-size:1rem;font-weight:700;letter-spacing:.08em;cursor:pointer;transition:all .2s;}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(168,85,247,.4);}
.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px 16px;color:#fca5a5;font-size:.85rem;margin-top:16px;display:none;}
.divider{margin-top:24px;padding-top:20px;border-top:1px solid rgba(255,255,255,.07);}
.hint-label{color:#6b7280;font-size:.7rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
.hint-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;background:rgba(255,255,255,.03);margin-bottom:8px;cursor:pointer;transition:background .2s;border:1px solid transparent;}
.hint-item:hover{background:rgba(255,255,255,.07);border-color:rgba(168,85,247,.2);}
.role-badge{font-size:.65rem;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.05em;white-space:nowrap;}
.admin-badge{background:rgba(250,204,21,.15);color:#fbbf24;}
.op-badge{background:rgba(34,197,94,.15);color:#4ade80;}
.hint-email{color:#94a3b8;font-size:.8rem;}
.loading{display:none;text-align:center;color:#c4b5fd;font-size:.85rem;margin-top:12px;}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="login-card">
  <div class="brand">
    <h1>💰 Doral Gastos</h1>
    <p><span class="dot"></span>Control Financiero Doral Store 2026</p>
  </div>
  <div class="form-group">
    <label>Correo electrónico</label>
    <input type="email" id="email" placeholder="correo@doralstore.co" autocomplete="off"/>
  </div>
  <div class="form-group">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"/>
  </div>
  <button class="btn-login" onclick="login()" id="btnLogin">INGRESAR →</button>
  <div class="loading" id="loading">Verificando acceso...</div>
  <div class="error" id="errorMsg"></div>
  <div class="divider">
    <div class="hint-label">Acceso rápido</div>
    <div class="hint-item" onclick="fillUser('admin@doralstore.co','admin2026')">
      <span class="role-badge admin-badge">ADMIN</span>
      <span class="hint-email">admin@doralstore.co</span>
    </div>
    <div class="hint-item" onclick="fillUser('picking@doralstore.co','picking2026')">
      <span class="role-badge op-badge">OPERARIO</span>
      <span class="hint-email">picking@doralstore.co</span>
    </div>
  </div>
</div>
<script>
const SB_URL='https://upeiygxcowihdaqzrukq.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVwZWl5Z3hjb3dpaGRhcXpydWtxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MTQzNDYsImV4cCI6MjA4OTE5MDM0Nn0.5qimb_jgYZQHQPQ0Fs-gnSAP1vASZ78AumeZn1748LE';
const starsEl=document.getElementById('stars');
for(let i=0;i<150;i++){const s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.animationDelay=Math.random()*3+'s';s.style.opacity=Math.random()*0.6+0.1;starsEl.appendChild(s);}
function fillUser(e,p){document.getElementById('email').value=e;document.getElementById('password').value=p;}
async function login(){
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('password').value.trim();
  const errEl=document.getElementById('errorMsg');
  const loadEl=document.getElementById('loading');
  const btn=document.getElementById('btnLogin');
  errEl.style.display='none';
  if(!email||!pass){errEl.textContent='Completa todos los campos.';errEl.style.display='block';return;}
  btn.style.display='none';loadEl.style.display='block';
  try{
    const res=await fetch(SB_URL+'/rest/v1/usuarios?email=eq.'+encodeURIComponent(email)+'&password_hash=eq.'+encodeURIComponent(pass)+'&activo=eq.true',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    const data=await res.json();
    if(data&&data.length>0){sessionStorage.setItem('dg_user',JSON.stringify(data[0]));window.location.href='app.html';}
    else{errEl.textContent='Usuario o contraseña incorrectos.';errEl.style.display='block';btn.style.display='block';loadEl.style.display='none';}
  }catch(e){errEl.textContent='Error de conexión.';errEl.style.display='block';btn.style.display='block';loadEl.style.display='none';}
}
</script>
</body>
</html>
